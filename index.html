<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotton Candy Cove</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a0a2e; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      z-index: 11;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 182, 213, 0.8);
    }
    #crosshair::before {
      width: 2px; height: 20px; left: 9px; top: 0;
    }
    #crosshair::after {
      width: 20px; height: 2px; top: 9px; left: 0;
    }
    #health-bar-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 20px;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #ff69b4;
      border-radius: 4px;
      z-index: 11;
    }
    #health-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ff69b4, #ffb6d5);
      border-radius: 2px;
      transition: width 0.3s;
    }
    #health-text {
      position: fixed;
      bottom: 44px;
      left: 20px;
      color: #ffb6d5;
      font-size: 12px;
      z-index: 11;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #time-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #ffb6d5;
      font-size: 14px;
      z-index: 11;
      text-align: right;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #inventory-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      z-index: 11;
    }
    .inv-slot {
      width: 48px;
      height: 48px;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #7b68ee;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffb6d5;
      font-size: 10px;
      text-align: center;
    }
    .inv-slot.active {
      border-color: #ff69b4;
      background: rgba(255, 105, 180, 0.2);
    }
    #start-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
    }
    #start-screen h1 {
      font-size: 48px;
      color: #ff69b4;
      text-shadow: 0 0 20px rgba(255, 105, 180, 0.5), 0 0 40px rgba(255, 105, 180, 0.3);
      margin-bottom: 10px;
      letter-spacing: 4px;
    }
    #start-screen p {
      color: #7b68ee;
      font-size: 16px;
      margin-bottom: 30px;
    }
    #start-screen .click-text {
      color: #ffb6d5;
      font-size: 14px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="start-screen">
    <h1>COTTON CANDY COVE</h1>
    <p>A Kaia Games Inc. Production</p>
    <span class="click-text">[ click to enter the cove ]</span>
  </div>
  <div id="crosshair"></div>
  <div id="health-text">HEALTH</div>
  <div id="health-bar-container"><div id="health-bar"></div></div>
  <div id="time-indicator">
    <div id="time-icon">DAY</div>
    <div id="time-remaining"></div>
  </div>
  <div id="inventory-bar"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
